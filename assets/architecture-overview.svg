<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 860" role="img" aria-labelledby="title desc">
  <title id="title">Homelab Architecture Overview</title>
  <desc id="desc">Executive overview of the homelab architecture with clear zones, ingress entry point, and primary flow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0a0d12"/>
    </linearGradient>
    <linearGradient id="zoneFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#151a22"/>
      <stop offset="100%" stop-color="#0f141b"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d0a064"/>
      <stop offset="100%" stop-color="#9d7441"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c69153"/>
    </marker>
    <style>
      .title { font: 700 34px 'IBM Plex Sans Condensed', 'Segoe UI', sans-serif; fill: #f5f7fa; letter-spacing: .04em; }
      .subtitle { font: 500 14px 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #95a2af; }
      .zone-title { font: 700 12px 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #d0a064; letter-spacing: .16em; text-transform: uppercase; }
      .node-title { font: 650 20px 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #eef2f6; }
      .node-copy { font: 500 13px 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #97a4b1; }
      .zone-copy { font: 500 13px 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #8f9aa6; }
      .zone { fill: url(#zoneFill); stroke: #252d36; stroke-width: 1.25; }
      .node { fill: #12171e; stroke: #303843; stroke-width: 1.15; }
    </style>
  </defs>

  <rect width="1400" height="860" fill="url(#bg)"/>
  <rect x="28" y="28" width="1344" height="804" rx="30" fill="none" stroke="#1c232b"/>

  <text x="72" y="88" class="title">HOMELAB ARCHITECTURE OVERVIEW</text>
  <text x="72" y="114" class="subtitle">Sanitized executive view of ingress, platform runtime, observability, and control planes</text>

  <rect x="60" y="154" width="1280" height="222" rx="28" class="zone"/>
  <text x="86" y="184" class="zone-title">Primary Request Flow</text>
  <text x="86" y="208" class="zone-copy">Entry point and core path from public traffic to protected services</text>

  <rect x="96" y="246" width="150" height="88" rx="18" class="node"/>
  <text x="124" y="282" class="node-title">Internet</text>
  <text x="124" y="304" class="node-copy">Public clients</text>

  <rect x="314" y="246" width="170" height="88" rx="18" class="node"/>
  <text x="342" y="282" class="node-title">Edge</text>
  <text x="342" y="304" class="node-copy">Flint 3, NAT, policy</text>

  <rect x="552" y="246" width="168" height="88" rx="18" class="node"/>
  <text x="580" y="282" class="node-title">Caddy</text>
  <text x="580" y="304" class="node-copy">TLS and routing</text>

  <rect x="788" y="246" width="178" height="88" rx="18" class="node"/>
  <text x="816" y="282" class="node-title">Authelia</text>
  <text x="816" y="304" class="node-copy">SSO and policy</text>

  <rect x="1034" y="232" width="268" height="116" rx="20" class="node"/>
  <text x="1062" y="274" class="node-title">Platform Services</text>
  <text x="1062" y="298" class="node-copy">Homepage, Grafana, Wazuh, Files,</text>
  <text x="1062" y="318" class="node-copy">ntfy, media management, AI tooling</text>

  <line x1="246" y1="290" x2="314" y2="290" stroke="url(#flow)" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="484" y1="290" x2="552" y2="290" stroke="url(#flow)" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="720" y1="290" x2="788" y2="290" stroke="url(#flow)" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="966" y1="290" x2="1034" y2="290" stroke="url(#flow)" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="60" y="414" width="402" height="330" rx="28" class="zone"/>
  <text x="86" y="444" class="zone-title">Platform Runtime</text>
  <text x="86" y="468" class="zone-copy">Single primary host and deployment model</text>

  <rect x="96" y="516" width="330" height="104" rx="20" class="node"/>
  <text x="124" y="556" class="node-title">Windows 11 + Docker Desktop</text>
  <text x="124" y="580" class="node-copy">Primary runtime host using WSL2 and Compose</text>

  <rect x="96" y="646" width="330" height="66" rx="18" class="node"/>
  <text x="124" y="686" class="node-title">Docker Compose</text>
  <text x="312" y="686" class="node-copy">repeatable local orchestration</text>

  <rect x="500" y="414" width="392" height="330" rx="28" class="zone"/>
  <text x="526" y="444" class="zone-title">Observability</text>
  <text x="526" y="468" class="zone-copy">Metrics, logs, probes, and routed alerts</text>

  <rect x="536" y="516" width="320" height="90" rx="20" class="node"/>
  <text x="564" y="552" class="node-title">Prometheus + Loki</text>
  <text x="564" y="574" class="node-copy">Metrics collection, log storage, query surface</text>

  <rect x="536" y="628" width="320" height="84" rx="20" class="node"/>
  <text x="564" y="662" class="node-title">Alertmanager + ntfy</text>
  <text x="564" y="684" class="node-copy">Notification and incident routing</text>

  <rect x="930" y="414" width="410" height="330" rx="28" class="zone"/>
  <text x="956" y="444" class="zone-title">Security and Control Planes</text>
  <text x="956" y="468" class="zone-copy">Detection, response, secrets, and external infra state</text>

  <rect x="966" y="506" width="164" height="98" rx="20" class="node"/>
  <text x="994" y="546" class="node-title">Wazuh</text>
  <text x="994" y="568" class="node-copy">SIEM and endpoint telemetry</text>

  <rect x="1148" y="506" width="156" height="98" rx="20" class="node"/>
  <text x="1176" y="546" class="node-title">CrowdSec</text>
  <text x="1176" y="568" class="node-copy">Ingress decisions</text>

  <rect x="966" y="628" width="164" height="84" rx="20" class="node"/>
  <text x="994" y="662" class="node-title">Infisical</text>
  <text x="994" y="684" class="node-copy">Secret source of truth</text>

  <rect x="1148" y="628" width="156" height="84" rx="20" class="node"/>
  <text x="1176" y="662" class="node-title">OpenTofu</text>
  <text x="1176" y="684" class="node-copy">DNS and infra metadata</text>

  <line x1="1168" y1="348" x2="1168" y2="414" stroke="#c69153" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1168" y1="348" x2="696" y2="414" stroke="#c69153" stroke-width="3.4" marker-end="url(#arrow)"/>
  <line x1="1168" y1="348" x2="260" y2="414" stroke="#c69153" stroke-width="3.4" marker-end="url(#arrow)"/>

  <rect x="60" y="774" width="1280" height="1" fill="#202731"/>
  <text x="72" y="804" class="subtitle">Public mirror intentionally omits live secrets, exact runtime wiring, and internal-only topology.</text>
</svg>
