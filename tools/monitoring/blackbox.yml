modules:
  http_2xx:
    prober: http
    timeout: 10s
    http:
      preferred_ip_protocol: "ip4"
      enable_http2: true
      follow_redirects: true
      valid_status_codes: [200, 301, 302, 400]
      fail_if_ssl: false
      fail_if_not_ssl: false
      tls_config:
        insecure_skip_verify: false

  http_auth:
    prober: http
    timeout: 10s
    http:
      preferred_ip_protocol: "ip4"
      enable_http2: true
      follow_redirects: true
      valid_status_codes: [200, 301, 302, 401, 403]
      fail_if_ssl: false
      fail_if_not_ssl: false
      tls_config:
        insecure_skip_verify: false
      headers:
        X-Blackbox-Token: "__BLACKBOX_TOKEN__"

  https_cert:
    prober: http
    timeout: 10s
    http:
      preferred_ip_protocol: "ip4"
      enable_http2: true
      tls_config:
        insecure_skip_verify: false
      fail_if_ssl: false
      fail_if_not_ssl: true
      method: GET
      follow_redirects: true

  https_cert_auth:
    prober: http
    timeout: 10s
    http:
      preferred_ip_protocol: "ip4"
      enable_http2: true
      tls_config:
        insecure_skip_verify: false
      valid_status_codes: [200, 301, 302, 401, 403]
      fail_if_ssl: false
      fail_if_not_ssl: true
      method: GET
      follow_redirects: true
      headers:
        X-Blackbox-Token: "__BLACKBOX_TOKEN__"

  dns:
    prober: dns
    timeout: 5s
    dns:
      preferred_ip_protocol: "ip4"
      query_name: "cloudflare.com"
      query_type: "A"

  icmp:
    prober: icmp
    timeout: 5s
    icmp:
      preferred_ip_protocol: "ip4"

  http_router:
    prober: http
    timeout: 10s
    http:
      preferred_ip_protocol: "ip4"
      valid_http_versions: ["HTTP/1.1"]
      method: GET
      follow_redirects: false
      valid_status_codes: [200, 302]
      headers:
        Accept-Encoding: gzip

  tcp_connect:
    prober: tcp
    timeout: 5s
    tcp:
      preferred_ip_protocol: "ip4"
