global:
  resolve_timeout: 5m

templates:
  - templates/telegram.tmpl

route:
  receiver: ntfy
  repeat_interval: 4h
  group_wait: 30s
  group_interval: 5m
  group_by: [alertname, job, instance, name]
  routes:
    - receiver: telegram
      continue: true

receivers:
  - name: ntfy
    webhook_configs:
      - url: http://alert-relay:9080/alertmanager
        send_resolved: true
  - name: telegram
    telegram_configs:
      - bot_token_file: /etc/alertmanager/secrets/telegram_bot_token
        chat_id: YOUR_CHAT_ID
        message: '{{ template "telegram.message" . }}'
        send_resolved: true
