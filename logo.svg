<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1814"/>
      <stop offset="100%" stop-color="#0a0908"/>
    </radialGradient>
    <linearGradient id="ring-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d19a66"/>
      <stop offset="50%" stop-color="#b08050"/>
      <stop offset="100%" stop-color="#d19a66"/>
    </linearGradient>
    <linearGradient id="inner-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d19a66" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#d19a66" stop-opacity="0.03"/>
    </linearGradient>
    <clipPath id="circle-clip">
      <circle cx="200" cy="200" r="155"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg-glow)" rx="0"/>

  <!-- Outer ring — thick, authoritative -->
  <circle cx="200" cy="200" r="172" stroke="url(#ring-grad)" stroke-width="3" fill="none"/>
  <circle cx="200" cy="200" r="158" stroke="#d19a66" stroke-width="0.5" fill="none" opacity="0.3"/>

  <!-- Ring text — agency-style circular text -->
  <path id="top-arc" d="M 60,200 a 140,140 0 0,1 280,0" fill="none"/>
  <text font-family="'DM Sans', 'Helvetica Neue', Arial, sans-serif" font-size="11.5" font-weight="600" fill="#d19a66" letter-spacing="0.28em">
    <textPath href="#top-arc" startOffset="50%" text-anchor="middle">HOMELAB INFRASTRUCTURE</textPath>
  </text>

  <path id="bottom-arc" d="M 340,200 a 140,140 0 0,1 -280,0" fill="none"/>
  <text font-family="'DM Sans', 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="500" fill="#d19a66" letter-spacing="0.22em" opacity="0.7">
    <textPath href="#bottom-arc" startOffset="50%" text-anchor="middle">SECURITY · OBSERVABILITY · AUTOMATION</textPath>
  </text>

  <!-- Separator dots on the ring -->
  <circle cx="55" cy="200" r="2.5" fill="#d19a66" opacity="0.6"/>
  <circle cx="345" cy="200" r="2.5" fill="#d19a66" opacity="0.6"/>

  <!-- Inner fill -->
  <circle cx="200" cy="200" r="120" fill="url(#inner-grad)"/>

  <!-- Grid / crosshair lines — surveillance aesthetic -->
  <g clip-path="url(#circle-clip)" opacity="0.08" stroke="#d19a66" stroke-width="0.5">
    <line x1="200" y1="45" x2="200" y2="355"/>
    <line x1="45" y1="200" x2="355" y2="200"/>
    <line x1="95" y1="55" x2="305" y2="345"/>
    <line x1="305" y1="55" x2="95" y2="345"/>
    <circle cx="200" cy="200" r="60" fill="none"/>
    <circle cx="200" cy="200" r="90" fill="none"/>
    <circle cx="200" cy="200" r="120" fill="none"/>
  </g>

  <!-- Central emblem — stylized eye / all-seeing-node -->
  <!-- Outer orbit rings -->
  <ellipse cx="200" cy="200" rx="80" ry="32" stroke="#d19a66" stroke-width="0.7" fill="none" opacity="0.25" transform="rotate(-20 200 200)"/>
  <ellipse cx="200" cy="200" rx="80" ry="32" stroke="#d19a66" stroke-width="0.7" fill="none" opacity="0.2" transform="rotate(25 200 200)"/>
  <ellipse cx="200" cy="200" rx="80" ry="32" stroke="#d19a66" stroke-width="0.5" fill="none" opacity="0.15" transform="rotate(70 200 200)"/>

  <!-- Hex shape — node cluster -->
  <polygon points="200,148 245,174 245,226 200,252 155,226 155,174"
           fill="none" stroke="#d19a66" stroke-width="1.5" opacity="0.5"/>
  <polygon points="200,160 235,180 235,220 200,240 165,220 165,180"
           fill="rgba(209,154,102,0.06)" stroke="#d19a66" stroke-width="0.5" opacity="0.3"/>

  <!-- Central core -->
  <circle cx="200" cy="200" r="18" fill="rgba(209,154,102,0.08)" stroke="#d19a66" stroke-width="1" opacity="0.6"/>
  <circle cx="200" cy="200" r="8" fill="#d19a66" opacity="0.15"/>
  <circle cx="200" cy="200" r="3.5" fill="#d19a66" opacity="0.7"/>

  <!-- Node points on hex vertices -->
  <circle cx="200" cy="148" r="3" fill="#d19a66" opacity="0.5"/>
  <circle cx="245" cy="174" r="2.5" fill="#d19a66" opacity="0.4"/>
  <circle cx="245" cy="226" r="2.5" fill="#d19a66" opacity="0.4"/>
  <circle cx="200" cy="252" r="3" fill="#d19a66" opacity="0.5"/>
  <circle cx="155" cy="226" r="2.5" fill="#d19a66" opacity="0.4"/>
  <circle cx="155" cy="174" r="2.5" fill="#d19a66" opacity="0.4"/>

  <!-- Connection lines from nodes to center -->
  <line x1="200" y1="148" x2="200" y2="197" stroke="#d19a66" stroke-width="0.5" opacity="0.2"/>
  <line x1="245" y1="174" x2="203" y2="197" stroke="#d19a66" stroke-width="0.5" opacity="0.2"/>
  <line x1="245" y1="226" x2="203" y2="203" stroke="#d19a66" stroke-width="0.5" opacity="0.2"/>
  <line x1="200" y1="252" x2="200" y2="203" stroke="#d19a66" stroke-width="0.5" opacity="0.2"/>
  <line x1="155" y1="226" x2="197" y2="203" stroke="#d19a66" stroke-width="0.5" opacity="0.2"/>
  <line x1="155" y1="174" x2="197" y2="197" stroke="#d19a66" stroke-width="0.5" opacity="0.2"/>

  <!-- Small satellite nodes — scattered like data points -->
  <circle cx="160" cy="135" r="1.5" fill="#d19a66" opacity="0.25"/>
  <circle cx="250" cy="145" r="1" fill="#d19a66" opacity="0.2"/>
  <circle cx="265" cy="200" r="1.5" fill="#d19a66" opacity="0.2"/>
  <circle cx="240" cy="260" r="1" fill="#d19a66" opacity="0.2"/>
  <circle cx="145" cy="245" r="1.5" fill="#d19a66" opacity="0.2"/>
  <circle cx="130" cy="190" r="1" fill="#d19a66" opacity="0.2"/>

  <!-- Stars / rank marks flanking the bottom text — military/agency touch -->
  <polygon points="63,200 65,195 67,200 65,205" fill="#d19a66" opacity="0.4"/>
  <polygon points="337,200 339,195 341,200 339,205" fill="#d19a66" opacity="0.4"/>
</svg>
