theme: oled

default_2fa_method: totp

authentication_backend:
  file:
    path: /config/users_database.yml

access_control:
  default_policy: deny
  rules:
    - domain: home.example.com
      policy: one_factor
    - domain:
        - grafana.example.com
        - prometheus.example.com
        - alerts.example.com
        - wazuh.example.com
      policy: two_factor

session:
  name: authelia_session
  secret: replace-me
  expiration: 1h
  inactivity: 15m
  remember_me: 30d
  cookies:
    - domain: example.com
      authelia_url: https://auth.example.com
      default_redirection_url: https://home.example.com

storage:
  local:
    path: /config/db.sqlite3

otp:
  issuer: example.com

identity_validation:
  reset_password:
    jwt_secret: replace-me

notifier:
  smtp:
    address: smtp://smtp.example.com:587
    sender: Homelab <homelab@example.com>
    username: mailer@example.com
    password: replace-me
